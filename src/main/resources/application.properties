spring.application.name=invoice-service
spring.profiles.active=dev

spring.config.import=aws-parameterstore:/config

logging.level.io.awspring.cloud.parameterstore=DEBUG

spring.datasource.url=${invoice-service.db-url}
spring.datasource.username=${invoice-service.db-user}
spring.datasource.password=${invoice-service.password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false